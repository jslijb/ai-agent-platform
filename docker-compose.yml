services:
  neo4j:
    image: neo4j:5
    container_name: aiagent_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/test1234
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - docker_default
    restart: unless-stopped

  embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_embedding
    ports:
      - "8011:8011"
    volumes:
      - D:\models\modelscope\models\OllmOne\bge-m3-GGUF:/models:ro
    command: >
      --model /models/bge-m3-q8_0.gguf
      --port 8011
      --host 0.0.0.0
      --embedding
      --pooling cls
      -c 8192
      -t 4
    networks:
      - docker_default
    restart: unless-stopped

  reranker:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_reranker
    ports:
      - "8010:8010"
    volumes:
      - D:\models\modelscope\bge-reranker-base:/models:ro
    command: >
      --model /models/bge-reranker-base-f16.gguf
      --port 8010
      --host 0.0.0.0
      --pooling rank
      -c 512
      -t 4
    networks:
      - docker_default
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  docker_default:
    external: true

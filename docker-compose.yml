services:
  neo4j:
    image: neo4j:5
    container_name: aiagent_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/test1234
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - docker_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p test1234 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_embedding
    ports:
      - "8011:8011"
    volumes:
      - D:\models\modelscope\models\OllmOne\bge-m3-GGUF:/models:ro
    command: >
      --model /models/bge-m3-q8_0.gguf
      --port 8011
      --host 0.0.0.0
      --embedding
      --pooling cls
      -c 8192
      -t 4
    networks:
      - docker_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  reranker:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_reranker
    ports:
      - "8010:8010"
    volumes:
      - D:\models\modelscope\models\gpustack\bge-reranker-v2-m3-GGUF:/models:ro
    command: >
      --model /models/bge-reranker-v2-m3-Q8_0.gguf
      --port 8010
      --host 0.0.0.0
      --reranking
      -c 8192
      -t 4
    networks:
      - docker_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  docker_default:
    external: true

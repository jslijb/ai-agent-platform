services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiagent_postgres
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-aiagent}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-aiagent_secret}
      POSTGRES_DB: ${PG_DB:-agentdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-aiagent} -d ${PG_DB:-agentdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aiagent_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5
    container_name: aiagent_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-test1234}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-test1234} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_embedding
    ports:
      - "${EMBEDDING_PORT:-8011}:8011"
    volumes:
      - ${MODEL_BASE_PATH:-D:/models/modelscope/models}/OllmOne/bge-m3-GGUF:/models:ro
    command: >
      --model /models/bge-m3-q8_0.gguf
      --port 8011
      --host 0.0.0.0
      --embedding
      --pooling cls
      -c 8192
      -b 1024
      -ub 1024
      -t ${EMBEDDING_THREADS:-4}
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  reranker:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_reranker
    ports:
      - "${RERANKER_PORT:-8010}:8010"
    volumes:
      - ${MODEL_BASE_PATH:-D:/models/modelscope/models}/gpustack/bge-reranker-v2-m3-GGUF:/models:ro
    command: >
      --model /models/bge-reranker-v2-m3-Q8_0.gguf
      --port 8010
      --host 0.0.0.0
      --reranking
      -c 8192
      -t ${RERANKER_THREADS:-4}
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  data-service:
    build:
      context: .
      dockerfile: data_service/Dockerfile
    container_name: aiagent_data_service
    ports:
      - "${DATA_SERVICE_PORT:-8001}:8001"
    environment:
      DATA_SERVICE_PORT: "8001"
    volumes:
      - ./config/api_keys.yaml:/app/config/api_keys.yaml:ro
      - ./.env.local:/app/.env.local:ro
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  rag-service:
    build:
      context: .
      dockerfile: services/rag-service/Dockerfile
    container_name: aiagent_rag_service
    ports:
      - "${RAG_SERVICE_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      RAG_SERVICE_PORT: "3001"
      RAG_SERVICE_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://${PG_USER:-aiagent}:${PG_PASSWORD:-aiagent_secret}@postgres:5432/${PG_DB:-agentdb}
      EMBEDDING_SERVICE_URL: http://embedding:8011
      RERANKER_SERVICE_URL: http://reranker:8010
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    networks:
      - aiagent_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  llm-gateway:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: services/llm-gateway/Dockerfile
    container_name: aiagent_llm_gateway
    ports:
      - "${LLM_GATEWAY_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      LLM_GATEWAY_PORT: "3002"
      LLM_GATEWAY_HOST: "0.0.0.0"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DATABASE_URL: postgresql://${PG_USER:-aiagent}:${PG_PASSWORD:-aiagent_secret}@postgres:5432/${PG_DB:-agentdb}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    networks:
      - aiagent_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  main-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiagent_main_service
    ports:
      - "${MAIN_SERVICE_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DATABASE_URL: postgresql://${PG_USER:-aiagent}:${PG_PASSWORD:-aiagent_secret}@postgres:5432/${PG_DB:-agentdb}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-test1234}
      EMBEDDING_SERVICE_URL: http://embedding:8011
      RERANKER_SERVICE_URL: http://reranker:8010
      RAG_SERVICE_URL: http://rag-service:3001
      LLM_GATEWAY_URL: http://llm-gateway:3002
      EVALUATION_SERVICE_URL: http://rag-service:3001
      DATA_SERVICE_URL: http://data-service:8001
      USE_MICROSERVICE: "true"
      AUTH_SECRET: ${AUTH_SECRET:-aiagent-dev-secret-change-in-production-2024}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    networks:
      - aiagent_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
      rag-service:
        condition: service_healthy
      data-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode < 500 ? 0 : (res.statusCode === 503 ? 0 : 1)); }).on('error', () => process.exit(1)).setTimeout(5000, () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: aiagent_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aiagent_net
    restart: unless-stopped
    depends_on:
      main-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
      data-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== 可观测性 =====

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aiagent_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aiagent_net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: aiagent_grafana
    ports:
      - "${GRAFANA_PORT:-3004}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - aiagent_net
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:

networks:
  aiagent_net:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiagent_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: aiagent_secret
      POSTGRES_DB: agentdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent -d agentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/redis:7-alpine
    container_name: aiagent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5
    container_name: aiagent_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/test1234
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p test1234 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_embedding
    ports:
      - "8011:8011"
    volumes:
      - D:\models\modelscope\models\OllmOne\bge-m3-GGUF:/models:ro
    command: >
      --model /models/bge-m3-q8_0.gguf
      --port 8011
      --host 0.0.0.0
      --embedding
      --pooling cls
      -c 8192
      -b 1024
      -ub 1024
      -t 4
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  reranker:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: aiagent_reranker
    ports:
      - "8010:8010"
    volumes:
      - D:\models\modelscope\models\gpustack\bge-reranker-v2-m3-GGUF:/models:ro
    command: >
      --model /models/bge-reranker-v2-m3-Q8_0.gguf
      --port 8010
      --host 0.0.0.0
      --reranking
      -c 8192
      -t 4
    networks:
      - aiagent_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  nginx:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/nginx:alpine
    container_name: aiagent_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aiagent_net
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - neo4j
      - embedding
      - reranker
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:

networks:
  aiagent_net:
    driver: bridge

# 金融行业 RAG & Agent 评估配置文件
# 支持指标权重、阈值、评估场景预设等配置

# 评估级别定义
evaluation_levels:
  daily:
    description: "日常评估 - 快速反馈"
    data_sources:
      - golden
      - historical_latest_50
    timeout_minutes: 10
  standard:
    description: "标准评估 - 中等深度"
    data_sources:
      - golden
      - historical_sampled
    timeout_minutes: 20
  full:
    description: "全面评估 - 上线前验证"
    data_sources:
      - golden
      - historical_all
      - opendataset
    timeout_minutes: 60

# RAG 评估指标权重配置
rag_weights:
  # 通用指标权重（合计 0.50）
  hits_at_k: 0.10
  context_relevance: 0.08
  context_recall: 0.07
  faithfulness: 0.12
  answer_relevance: 0.13
  # 金融专用指标权重（合计 0.50）
  numerical_accuracy: 0.15
  compliance_score: 0.15
  hallucination_rate: 0.10
  risk_disclosure: 0.05
  timeliness: 0.05

# Agent 评估指标权重配置
agent_weights:
  tool_selection: 0.25
  planning: 0.20
  compliance: 0.25
  consistency: 0.15
  efficiency: 0.15

# 评估阈值配置
thresholds:
  # 退化告警阈值 - 指标下降超过此值时告警
  regression_alert: 0.05
  # 数值精确度误差容忍范围
  numerical_tolerance: 0.05
  # 合规性最低通过线
  compliance_minimum: 0.6
  # 幻觉率最高容忍线
  hallucination_maximum: 0.3

# 评估场景预设
presets:
  compliance_first:
    description: "合规优先 - 适用于金融监管场景"
    rag_weights:
      hits_at_k: 0.05
      context_relevance: 0.05
      context_recall: 0.05
      faithfulness: 0.10
      answer_relevance: 0.10
      numerical_accuracy: 0.10
      compliance_score: 0.30
      hallucination_rate: 0.15
      risk_disclosure: 0.05
      timeliness: 0.05
    agent_weights:
      tool_selection: 0.15
      planning: 0.10
      compliance: 0.45
      consistency: 0.15
      efficiency: 0.15
  accuracy_first:
    description: "准确性优先 - 适用于研究分析场景"
    rag_weights:
      hits_at_k: 0.12
      context_relevance: 0.10
      context_recall: 0.08
      faithfulness: 0.15
      answer_relevance: 0.15
      numerical_accuracy: 0.20
      compliance_score: 0.05
      hallucination_rate: 0.10
      risk_disclosure: 0.02
      timeliness: 0.03
    agent_weights:
      tool_selection: 0.30
      planning: 0.25
      compliance: 0.10
      consistency: 0.20
      efficiency: 0.15
  efficiency_first:
    description: "效率优先 - 适用于高频查询场景"
    rag_weights:
      hits_at_k: 0.15
      context_relevance: 0.10
      context_recall: 0.10
      faithfulness: 0.10
      answer_relevance: 0.15
      numerical_accuracy: 0.10
      compliance_score: 0.10
      hallucination_rate: 0.05
      risk_disclosure: 0.05
      timeliness: 0.10
    agent_weights:
      tool_selection: 0.20
      planning: 0.15
      compliance: 0.10
      consistency: 0.10
      efficiency: 0.45

# 开源数据集配置
datasets:
  base_path: "D:\\data\\modelscope"
  finEval:
    enabled: true
    path: "D:\\data\\modelscope\\FinEval"
    max_samples: 200
  cflue:
    enabled: true
    path: "D:\\data\\modelscope\\CFLUE"
    max_samples: 200
  finQA:
    enabled: true
    path: "D:\\data\\modelscope\\FinQA"
    max_samples: 100
  convFinQA:
    enabled: false
    path: "D:\\data\\modelscope\\ConvFinQA"
    max_samples: 100

# 触发模式配置
trigger:
  # 默认触发模式：manual（手动）或 auto（自动）
  default_mode: manual
  # 自动触发条件（仅 auto 模式生效）
  auto:
    # 定时触发
    schedule:
      enabled: false
      cron: "0 2 * * *"  # 每天凌晨2点
      level: daily
    # 部署后触发
    post_deploy:
      enabled: false
      level: standard
    # 文档更新后触发
    post_document_update:
      enabled: false
      level: daily
    # 错误率上升触发
    error_rate_spike:
      enabled: false
      threshold: 0.1
      level: standard

# 历史查询配置
historical_queries:
  # 评估数据池最小积累量
  min_pool_size: 50
  # 自动构建评估集时的采样数量
  sample_size: 100
  # LLM 自动标注参考答案
  auto_label:
    enabled: true
    confidence_threshold: 0.6

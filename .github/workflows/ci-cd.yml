name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Configure npm registry
        run: npm config set registry https://registry.npmmirror.com

      - run: npm install
      - run: npm run lint
      - name: TypeCheck
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Configure npm registry
        run: npm config set registry https://registry.npmmirror.com

      - run: npm install
      - name: Run Unit Tests
        run: npm run test:ci

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.DOCKER_REGISTRY }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::Docker secrets not configured, skipping build & push"
          fi

      - name: Login to Container Registry
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Next.js
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/ai-agent-platform:latest
            ${{ secrets.DOCKER_REGISTRY }}/ai-agent-platform:${{ github.sha }}

      - name: Build and push Data Service
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./data_service
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/ai-agent-data-service:latest
            ${{ secrets.DOCKER_REGISTRY }}/ai-agent-data-service:${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check Deploy secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::Deploy secrets not configured, skipping deployment"
          fi

      - name: Deploy via SSH
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.override.server.yml pull
            docker compose -f docker-compose.yml -f docker-compose.override.server.yml up -d --remove-orphans
            docker image prune -f
